# openocd.cfg - ST-LINK/V2 + STM32F407VET6
# For use with STM32CubeCLT bundled OpenOCD

# ST-LINK/V2 interface (native HLA mode)
source [find interface/stlink.cfg]

# SWD transport
transport select hla_swd

# STM32F4x target
source [find target/stm32f4x.cfg]

# Reset config: hold core in reset during connect to recover locked chips
reset_config srst_only srst_nogate
adapter srst delay 100
adapter srst pulse_width 100

# Unlock the chip on connect (critical for locked chips)
$_TARGETNAME configure -event reset-init {
    # Enable debug in low-power modes
    mmw 0xE0042004 0x00000007 0
}
